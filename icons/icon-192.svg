<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#16101f"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8923a"/>
      <stop offset="100%" stop-color="#e8b86d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background pill -->
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>
  <!-- Amber border -->
  <rect x="3" y="3" width="186" height="186" rx="33" fill="none" stroke="url(#amber)" stroke-width="2" opacity="0.5"/>
  <!-- Graduation cap board -->
  <polygon points="96,38 152,64 96,90 40,64" fill="url(#amber)" filter="url(#glow)"/>
  <!-- Cap body/hat box -->
  <rect x="72" y="64" width="48" height="34" rx="5" fill="url(#amber)"/>
  <!-- Tassel cord -->
  <line x1="152" y1="64" x2="152" y2="88" stroke="url(#amber)" stroke-width="3"/>
  <circle cx="152" cy="94" r="6" fill="url(#amber)"/>
  <!-- "MART" brand text -->
  <text x="96" y="147" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="url(#amber)" text-anchor="middle" letter-spacing="-1" filter="url(#glow)">MART</text>
  <!-- Shine accent -->
  <ellipse cx="96" cy="175" rx="48" ry="4" fill="url(#amber)" opacity="0.15"/>
</svg>
