<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#16101f"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8923a"/>
      <stop offset="100%" stop-color="#e8b86d"/>
    </linearGradient>
    <radialGradient id="glow-bg" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#c8923a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c8923a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Glow backdrop -->
  <ellipse cx="256" cy="220" rx="200" ry="160" fill="url(#glow-bg)"/>
  <!-- Amber border ring -->
  <rect x="8" y="8" width="496" height="496" rx="88" fill="none" stroke="url(#amber)" stroke-width="5" opacity="0.4"/>
  <!-- Graduation cap board (mortarboard top) -->
  <polygon points="256,100 408,168 256,236 104,168" fill="url(#amber)" filter="url(#glow)"/>
  <!-- Cap body -->
  <rect x="192" y="168" width="128" height="90" rx="12" fill="url(#amber)"/>
  <!-- Tassel -->
  <line x1="408" y1="168" x2="408" y2="232" stroke="url(#amber)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="408" cy="248" r="18" fill="url(#amber)"/>
  <!-- Brand text -->
  <text x="256" y="390" font-family="Arial Black, sans-serif" font-weight="900" font-size="108" fill="url(#amber)" text-anchor="middle" letter-spacing="-3" filter="url(#glow)">MART</text>
  <!-- Tagline -->
  <text x="256" y="430" font-family="Arial, sans-serif" font-weight="600" font-size="28" fill="#e8b86d" text-anchor="middle" opacity="0.7" letter-spacing="6">VIIT CAMPUS</text>
  <!-- Bottom shine -->
  <ellipse cx="256" cy="490" rx="120" ry="6" fill="url(#amber)" opacity="0.12"/>
</svg>
