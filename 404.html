<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Page Not Found | NIRVANA MART</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
    }
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 50% 30%, rgba(108,99,255,0.15) 0%, transparent 70%);
    }
    .container { max-width: 600px; width: 100%; z-index: 1; }
    .code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 900;
      background: linear-gradient(135deg, #6c63ff, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      animation: glitch 2s infinite;
    }
    @keyframes glitch {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-3px, 1px); }
      94% { transform: translate(3px, -1px); }
      96% { transform: translate(-2px, 2px); }
    }
    .title { font-size: 1.6rem; font-weight: 700; margin: 1rem 0 0.5rem; }
    .subtitle { color: #94a3b8; margin-bottom: 2rem; font-size: 1rem; }
    .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      padding: 0.75rem 1.75rem;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      font-family: inherit;
    }
    .btn:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn-primary { background: linear-gradient(135deg, #6c63ff, #4f46e5); color: #fff; }
    .btn-ghost { background: rgba(255,255,255,0.06); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.1); }
    .icon-wrap { font-size: 2.5rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="container">
    <div class="code">404</div>
    <div class="icon-wrap">🛒</div>
    <div class="title">Oops! Page Not Found</div>
    <p class="subtitle">The page you're looking for doesn't exist or has been moved.<br>Let's get you back on track.</p>
    <div class="btn-group">
      <a href="/" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
      <a href="/shop" class="btn btn-ghost"><i class="fas fa-store"></i> Browse Shop</a>
    </div>
  </div>
</body>
</html>
