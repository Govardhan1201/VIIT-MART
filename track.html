<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Tracking — VIIT Mart</title>
  <meta name="description" content="Track your VIIT Mart order status in real-time.">
  <link rel="stylesheet" href="shared/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="loader-logo">🎓 VIIT Mart</div><div class="loader-bar"><div class="loader-bar-fill"></div></div></div>

<nav class="navbar">
  <div class="navbar-inner container">
    <a href="index.html" class="nav-logo"><div class="logo-icon">🎓</div>VIIT Mart</a>
    <div style="flex:1;"></div>
    <div class="nav-actions">
      <button class="dark-toggle" id="darkModeToggle"></button>
      <a href="buyer.html" class="btn btn-ghost btn-sm"><i class="fas fa-user"></i> My Dashboard</a>
    </div>
  </div>
</nav>

<main class="page-pad" style="padding-bottom:80px;">
  <div class="container" style="padding-top:48px;max-width:700px;">
    <div style="text-align:center;margin-bottom:40px;" data-reveal>
      <div style="font-size:3rem;margin-bottom:12px;">📦</div>
      <h1 style="font-size:2.2rem;font-weight:800;letter-spacing:-0.5px;">Track Your Order</h1>
      <p style="color:var(--text-muted);margin-top:8px;">Enter your Order ID to see live tracking status</p>
    </div>

    <div style="background:var(--bg-card);border:1.5px solid var(--border-color);border-radius:20px;padding:28px;margin-bottom:28px;" data-reveal>
      <div style="display:flex;gap:10px;">
        <input type="text" id="orderInput" class="form-control" placeholder="Enter Order ID (e.g. ABC12345...)" style="flex:1;">
        <button class="btn btn-primary" onclick="trackOrder()"><i class="fas fa-search"></i> Track</button>
      </div>
    </div>

    <div id="trackResult" style="display:none;" data-reveal>
      <div style="background:var(--bg-card);border:1.5px solid var(--border-color);border-radius:20px;padding:28px;">
        <div style="margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border-color);" id="orderInfo"></div>
        <h2 style="font-weight:800;margin-bottom:20px;">Tracking Timeline</h2>
        <div class="tracking-timeline" id="trackingTimeline"></div>
        <div style="margin-top:28px;padding:16px;background:rgba(99,102,241,0.06);border-radius:12px;font-size:0.88rem;" id="nextStepInfo"></div>
        <div style="margin-top:20px;display:flex;gap:12px;flex-wrap:wrap;">
          <a href="buyer.html" class="btn btn-ghost btn-sm"><i class="fas fa-arrow-left"></i> My Dashboard</a>
          <a href="shop.html" class="btn btn-primary btn-sm"><i class="fas fa-store"></i> Browse More</a>
        </div>
      </div>
    </div>

    <div id="trackError" style="display:none;text-align:center;padding:40px;background:var(--bg-card);border:1.5px solid var(--border-color);border-radius:20px;">
      <div style="font-size:2.5rem;margin-bottom:12px;">🔍</div>
      <div style="font-weight:800;margin-bottom:8px;">Order Not Found</div>
      <p style="color:var(--text-muted);font-size:0.9rem;">Please check the Order ID and try again. <br>You can find your Order ID in the <a href="buyer.html" style="color:var(--accent-primary);">dashboard</a>.</p>
    </div>
  </div>
</main>

<div id="toast-container"></div>
<script src="shared/js/auth.js"></script>
<script src="shared/js/api.js?v=2"></script>
<script src="shared/js/effects.js"></script>
<script>
const steps = [
  { key: 'pending', label: 'Order Placed', icon: '📋', desc: 'Your order has been placed and is waiting for the seller to be contacted.' },
  { key: 'seller-contacted', label: 'Seller Contacted', icon: '📞', desc: 'Admin has reached out to the seller about your order.' },
  { key: 'seller-delivered-to-admin', label: 'Product at Admin', icon: '🏢', desc: 'The seller has handed the product to our admin.' },
  { key: 'buyer-notified', label: 'Collection Ready', icon: '🔔', desc: 'You have been notified — the product is ready for collection!' },
  { key: 'completed', label: 'Completed', icon: '✅', desc: 'Your order is complete. Enjoy your purchase!' }
];
const statusMap = { 'pending': 0, 'seller contacted': 1, 'seller-contacted': 1, 'seller delivered to admin': 2, 'seller-delivered-to-admin': 2, 'buyer notified': 3, 'buyer-notified': 3, 'completed': 4 };

document.addEventListener('DOMContentLoaded', async () => {
  const urlId = new URLSearchParams(window.location.search).get('order');
  if (urlId) { document.getElementById('orderInput').value = urlId; await trackOrder(); }
});

async function trackOrder() {
  const orderId = document.getElementById('orderInput').value.trim();
  if (!orderId) { showToast('Enter an Order ID', 'error'); return; }
  const user = Auth.getUser();
  if (!user) { showToast('Please login to track orders', 'error'); window.location.href = '/login'; return; }
  try {
    const orders = await API.get('/orders/mine');
    const order = orders.find(o => o.id.toLowerCase().includes(orderId.toLowerCase()) || o.id.toLowerCase() === orderId.toLowerCase());
    if (!order) { document.getElementById('trackResult').style.display = 'none'; document.getElementById('trackError').style.display = 'block'; return; }
    renderTracking(order);
    document.getElementById('trackError').style.display = 'none';
    document.getElementById('trackResult').style.display = 'block';
  } catch(e) { showToast('Failed to fetch order. Are you logged in?', 'error'); }
}

function renderTracking(order) {
  const currentIdx = statusMap[order.status] ?? 0;
  document.getElementById('orderInfo').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:0.9rem;">
      <div><div style="color:var(--text-muted);font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Order ID</div><div style="font-weight:800;font-family:monospace;">${order.id.substring(0,16).toUpperCase()}</div></div>
      <div><div style="color:var(--text-muted);font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Product</div><div style="font-weight:700;">${order.product_title}</div></div>
      <div><div style="color:var(--text-muted);font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Amount Paid</div><div style="font-weight:800;color:var(--accent-primary);">₹${order.total_paid.toLocaleString()}</div></div>
      <div><div style="color:var(--text-muted);font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Date Ordered</div><div style="font-weight:700;">${new Date(order.ordered_at).toLocaleDateString()}</div></div>
    </div>`;
  document.getElementById('trackingTimeline').innerHTML = steps.map((step, i) => `
    <div class="timeline-step ${i < currentIdx ? 'done' : i === currentIdx ? 'current' : ''}">
      <div class="timeline-dot">${i < currentIdx ? '✓' : step.icon}</div>
      <div class="timeline-info">
        <div class="step-label">${step.label}</div>
        <div class="step-desc">${step.desc}</div>
      </div>
    </div>`).join('');
  const next = steps[Math.min(currentIdx + 1, steps.length - 1)];
  document.getElementById('nextStepInfo').innerHTML = currentIdx < steps.length - 1
    ? `<i class="fas fa-info-circle" style="color:var(--accent-primary);"></i> <strong>Next step:</strong> ${next.label} — ${next.desc}`
    : `<i class="fas fa-check-circle" style="color:var(--accent-green);"></i> <strong>Your order is complete!</strong> Thank you for shopping on VIIT Mart.`;
}
</script>
</body>
</html>
